name: Brume
options:
  bundleIdPrefix: com.anaasbouziani
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    ENABLE_BITCODE: NO
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Brume:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Brume
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Brume/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.anaasbouziani.brume
        INFOPLIST_FILE: Brume/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
    entitlements:
      path: Brume/Brume.entitlements
    capabilities:
      pushNotifications: {}
      backgroundModes:
        modes:
          - remote-notification
      dataProtection: {}
